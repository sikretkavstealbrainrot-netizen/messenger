<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Чаты</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f7fa;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 600px;
            text-align: center;
        }
        h2 {
            color: #1a1a2e;
            margin-bottom: 10px;
        }
        .user-greeting {
            color: #667eea;
            font-size: 18px;
            margin: 20px 0;
        }
        .btn {
            display: inline-block;
            padding: 14px 28px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            margin: 8px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102,126,234,0.4);
        }
        .btn-secondary {
            background: #e8ecf1;
            color: #333;
        }
        .btn-secondary:hover {
            background: #d5d9e0;
        }
        .btn-danger {
            background: #e74c3c;
            color: white;
        }
        .btn-danger:hover {
            background: #c0392b;
        }
        .features {
            margin: 30px 0;
            padding: 20px;
            background: #f8f9fc;
            border-radius: 12px;
            text-align: left;
        }
        .features li {
            list-style: none;
            padding: 8px 0;
            border-bottom: 1px solid #eee;
            color: #555;
        }
        .features li:last-child {
            border-bottom: none;
        }
        .features li::before {
            content: "✅ ";
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>💬 Добро пожаловать!</h2>
        <div class="user-greeting" id="greeting">Загрузка...</div>
        
        <div class="features">
            <li>Вы вошли в мессенджер</li>
            <li>Безопасный код защищает ваш аккаунт</li>
            <li>Настройки доступны в профиле</li>
        </div>
        
        <div>
            <button class="btn btn-primary" onclick="location.href='profile.html'">⚙️ Настройки</button>
            <button class="btn btn-danger" onclick="logout()">🚪 Выйти</button>
        </div>
    </div>

    <script>
        const db = firebase.firestore();

        firebase.auth().onAuthStateChanged((user) => {
            if (user) {
                db.collection('users').doc(user.uid).get()
                    .then((doc) => {
                        if (doc.exists) {
                            const data = doc.data();
                            document.getElementById('greeting').textContent = 'Привет, ' + (data.username || 'Пользователь') + '!';
                        } else {
                            document.getElementById('greeting').textContent = 'Привет!';
                        }
                    });
            } else {
                window.location.href = 'index.html';
            }
        });

        function logout() {
            firebase.auth().signOut()
                .then(() => {
                    window.location.href = 'index.html';
                })
                .catch((error) => {
                    alert('Ошибка выхода: ' + error.message);
                });
        }
    </script>
</body>
</html>
