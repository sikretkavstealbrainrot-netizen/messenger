<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Профиль</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="firebase-config.js"></script>
    <style>
        body { font-family: Arial; max-width: 400px; margin: 50px auto; padding: 20px; }
        button { display: block; width: 100%; padding: 10px; margin: 10px 0; }
    </style>
</head>
<body>
    <h2>Профиль</h2>
    <p id="userEmail">Email: </p>
    <button onclick="logout()">Выйти</button>
    <button onclick="location.href='chats.html'">Назад к чатам</button>
    
    <!-- ❌ УДАЛЕНЫ ВСЕ ФУНКЦИИ СМЕНЫ EMAIL -->
    <!-- Больше нет:
         - формы для смены email
         - отправки подтверждения на почту
         - кнопки "Подтвердить email"
    -->

    <script>
        // Отображение текущего пользователя
        firebase.auth().onAuthStateChanged(user => {
            if (user) {
                document.getElementById('userEmail').textContent = 'Email: ' + user.email;
            } else {
                window.location.href = 'index.html';
            }
        });

        // Выход
        function logout() {
            firebase.auth().signOut()
                .then(() => { window.location.href = 'index.html'; })
                .catch(error => alert(error.message));
        }

        // ❌ УДАЛЕНА ФУНКЦИЯ СМЕНЫ EMAIL
        // Больше нет:
        // - updateEmail()
        // - sendEmailVerification()
        // - подтверждения смены email по ссылке из письма
    </script>
</body>
</html>
