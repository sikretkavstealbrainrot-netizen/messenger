<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Профиль</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="firebase-config.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        h2 { color: #1a1a2e; margin-bottom: 8px; }
        .subtitle { color: #888; font-size: 14px; margin-bottom: 30px; }
        .email-box {
            background: #f0f2ff;
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 30px;
            color: #333;
            font-size: 18px;
            font-weight: 500;
        }
        .email-box span { color: #667eea; }
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 12px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(102,126,234,0.4); }
        .btn-danger { background: #e74c3c; color: white; }
        .btn-danger:hover { background: #c0392b; }
        .btn-secondary { background: #e8ecf1; color: #333; }
        .btn-secondary:hover { background: #d5d9e0; }
        .status {
            padding: 12px;
            border-radius: 10px;
            font-size: 14px;
            margin-top: 12px;
            display: none;
        }
        .status.success { display: block; background: #d4edda; color: #155724; }
        .status.error { display: block; background: #fde8e8; color: #c0392b; }
    </style>
</head>
<body>
    <div class="container">
        <h2>👤 Профиль</h2>
        <p class="subtitle">Ваши данные</p>
        
        <div class="email-box">
            📧 <span id="userEmail">Загрузка...</span>
        </div>
        
        <!-- ❌ УДАЛЕНА ФОРМА СМЕНЫ EMAIL -->
        <!-- ❌ УДАЛЕНА КНОПКА ПОДТВЕРЖДЕНИЯ EMAIL -->
        
        <button class="btn btn-primary" onclick="location.href='chats.html'">💬 Перейти в чаты</button>
        <button class="btn btn-danger" onclick="logout()">🚪 Выйти</button>
        
        <div class="status" id="statusMessage"></div>
    </div>

    <script>
        firebase.auth().onAuthStateChanged((user) => {
            if (user) {
                document.getElementById('userEmail').textContent = user.email || 'Email не указан';
            } else {
                window.location.href = 'index.html';
            }
        });

        function logout() {
            firebase.auth().signOut()
                .then(() => { window.location.href = 'index.html'; })
                .catch((error) => {
                    const el = document.getElementById('statusMessage');
                    el.textContent = '❌ ' + error.message;
                    el.className = 'status error';
                });
        }

        // ❌ УДАЛЕНЫ ВСЕ ФУНКЦИИ СВЯЗАННЫЕ С EMAIL:
        // - sendEmailVerification()
        // - updateEmail()
        // - changeEmail()
    </script>
</body>
</html>
