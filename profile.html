<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Настройки</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 40px 35px;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 450px;
        }
        h2 {
            text-align: center;
            color: #1a1a2e;
            margin-bottom: 8px;
        }
        .subtitle {
            text-align: center;
            color: #888;
            font-size: 14px;
            margin-bottom: 30px;
        }
        .user-info {
            background: #f0f2ff;
            padding: 14px;
            border-radius: 12px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .user-info span {
            font-weight: 600;
            color: #333;
        }
        .user-info .badge {
            background: #667eea;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #555;
            margin-bottom: 6px;
        }
        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e8ecf1;
            border-radius: 12px;
            font-size: 16px;
            color: #333;
            background: #fafbfc;
            transition: all 0.3s ease;
            font-family: inherit;
        }
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            background: white;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }
        .code-input {
            letter-spacing: 2px;
            font-weight: 600;
            text-align: center;
        }
        .code-hint {
            font-size: 12px;
            color: #999;
            margin-top: 4px;
            text-align: center;
        }
        .btn-primary {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 5px;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 28px rgba(102, 126, 234, 0.4);
        }
        .btn-danger {
            width: 100%;
            padding: 14px;
            background: #e74c3c;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }
        .btn-danger:hover {
            background: #c0392b;
        }
        .btn-secondary {
            width: 100%;
            padding: 14px;
            background: #e8ecf1;
            color: #333;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }
        .btn-secondary:hover {
            background: #d5d9e0;
        }
        .warning-box {
            background: #fff3cd;
            border-left: 4px solid #ffc107;
            padding: 16px;
            border-radius: 10px;
            margin-top: 20px;
            font-size: 14px;
            color: #856404;
            line-height: 1.5;
        }
        .warning-box strong {
            color: #d39e00;
        }
        .message {
            padding: 12px;
            border-radius: 10px;
            margin-top: 16px;
            text-align: center;
            display: none;
        }
        .message.success {
            display: block;
            background: #d4edda;
            color: #155724;
        }
        .message.error {
            display: block;
            background: #fde8e8;
            color: #c0392b;
        }
        .message.info {
            display: block;
            background: #e8f0fe;
            color: #1a73e8;
        }
        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        .status-badge.active {
            background: #d4edda;
            color: #155724;
        }
        .status-badge.inactive {
            background: #fde8e8;
            color: #c0392b;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>⚙️ Настройки</h2>
        <p class="subtitle">Управление безопасностью аккаунта</p>
        
        <div class="user-info" id="userInfo">
            <span id="displayUsername">Загрузка...</span>
            <span class="badge" id="codeStatus">Без кода</span>
        </div>
        
        <div class="form-group">
            <label>🔑 Безопасный код</label>
            <input type="password" id="securityCode" class="code-input" placeholder="Введите код (1-6 символов)" maxlength="6">
            <div class="code-hint">Можно использовать буквы, цифры и символы. От 1 до 6 символов.</div>
        </div>
        
        <button class="btn-primary" onclick="saveCode()">💾 Сохранить код</button>
        <button class="btn-danger" onclick="removeCode()">🗑️ Удалить код</button>
        
        <div id="message" class="message"></div>
        
        <div class="warning-box">
            <strong>⚠️ ВНИМАНИЕ!</strong><br>
            Никому не говорите этот код! Мы не несём ответственность за ваш аккаунт, если вы отправили код незнакомым людям.
        </div>
        
        <button class="btn-secondary" onclick="location.href='chats.html'">💬 Назад в чаты</button>
        <button class="btn-secondary" onclick="logout()" style="margin-top: 6px;">🚪 Выйти</button>
    </div>

    <script>
        const db = firebase.firestore();
        let currentUser = null;
        let userDocRef = null;

        firebase.auth().onAuthStateChanged((user) => {
            if (user) {
                currentUser = user;
                userDocRef = db.collection('users').doc(user.uid);
                loadUserData();
            } else {
                window.location.href = 'index.html';
            }
        });

        function loadUserData() {
            if (!userDocRef) return;
            userDocRef.get()
                .then((doc) => {
                    if (doc.exists) {
                        const data = doc.data();
                        document.getElementById('displayUsername').textContent = data.username || 'Без имени';
                        const code = data.securityCode || '';
                        const statusBadge = document.getElementById('codeStatus');
                        if (code.length > 0) {
                            statusBadge.textContent = '🔒 Код установлен';
                            statusBadge.style.background = '#d4edda';
                            statusBadge.style.color = '#155724';
                        } else {
                            statusBadge.textContent = '🔓 Код не установлен';
                            statusBadge.style.background = '#fde8e8';
                            statusBadge.style.color = '#c0392b';
                        }
                        document.getElementById('securityCode').value = code;
                    }
                })
                .catch((error) => {
                    showMessage('Ошибка загрузки: ' + error.message, 'error');
                });
        }

        function saveCode() {
            const code = document.getElementById('securityCode').value.trim();
            
            if (code.length === 0) {
                showMessage('⚠️ Введите код (1-6 символов)', 'error');
                return;
            }
            if (code.length > 6) {
                showMessage('⚠️ Код должен быть не длиннее 6 символов', 'error');
                return;
            }
            
            if (!userDocRef) {
                showMessage('❌ Ошибка: пользователь не загружен', 'error');
                return;
            }
            
            userDocRef.update({
                securityCode: code
            })
            .then(() => {
                showMessage('✅ Код успешно сохранён!', 'success');
                loadUserData();
            })
            .catch((error) => {
                showMessage('❌ Ошибка сохранения: ' + error.message, 'error');
            });
        }

        function removeCode() {
            if (!confirm('Вы уверены, что хотите удалить безопасный код?')) return;
            
            if (!userDocRef) {
                showMessage('❌ Ошибка: пользователь не загружен', 'error');
                return;
            }
            
            userDocRef.update({
                securityCode: ''
            })
            .then(() => {
                showMessage('✅ Код удалён!', 'success');
                loadUserData();
                document.getElementById('securityCode').value = '';
            })
            .catch((error) => {
                showMessage('❌ Ошибка удаления: ' + error.message, 'error');
            });
        }

        function showMessage(text, type) {
            const el = document.getElementById('message');
            el.textContent = text;
            el.className = 'message ' + type;
            setTimeout(() => {
                el.className = 'message';
            }, 5000);
        }

        function logout() {
            firebase.auth().signOut()
                .then(() => {
                    window.location.href = 'index.html';
                })
                .catch((error) => {
                    showMessage('❌ Ошибка выхода: ' + error.message, 'error');
                });
        }
    </script>
</body>
</html>
