<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Aurora</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="toast-root"></div>

<div class="app-shell" id="appShell">

  <!-- Rail navigation (desktop) -->
  <nav class="railnav">
    <div class="logo rail-logo">A</div>
    <button class="rail-btn active" data-tab="chats" title="Чаты">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
    </button>
    <button class="rail-btn" data-tab="contacts" title="Контакты">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
    </button>
    <div class="spacer"></div>
    <button class="rail-btn" id="railProfileBtn" title="Профиль">
      <div class="avatar sm" id="railAvatar"></div>
    </button>
  </nav>

  <!-- List panel: chats or contacts -->
  <section class="listpanel" style="position:relative;">
    <div class="listpanel-header">
      <div class="listpanel-title">
        <h1 id="listTitle">Чаты</h1>
        <button class="btn-icon" id="themeBtn" title="Тема">
          <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
      </div>
      <div class="search-box">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        <input type="text" id="searchInput" placeholder="Поиск">
      </div>
    </div>
    <div class="list-scroll" id="listScroll"></div>
    <button class="fab" id="fabBtn" title="Новый чат">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2"><path d="M12 5v14M5 12h14"/></svg>
    </button>
  </section>

  <!-- Chat panel -->
  <section class="chatpanel" id="chatPanel">
    <div class="chatpanel-empty" id="chatEmpty">
      <div class="logo">Aurora</div>
      <div>Выберите чат слева или начните новый</div>
    </div>

    <div class="hidden" id="chatActive" style="display:none; flex-direction:column; height:100%;">
      <div class="chat-header">
        <button class="btn-icon back-btn" id="backBtn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg>
        </button>
        <div class="avatar sm" id="chatHeaderAvatar"></div>
        <div class="who" id="chatHeaderInfo">
          <div class="name" id="chatHeaderName"></div>
          <div class="status" id="chatHeaderStatus"></div>
        </div>
        <div class="actions">
          <button class="btn-icon btn-danger" id="leaveChatBtn" title="Покинуть/удалить чат">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/></svg>
          </button>
        </div>
      </div>

      <div class="messages-scroll" id="messagesScroll"></div>

      <div class="editing-banner hidden" id="editingBanner">
        <span>Редактирование сообщения</span>
        <button class="btn-icon" id="cancelEditBtn" style="width:22px;height:22px;">✕</button>
      </div>
      <div class="composer">
        <textarea id="messageInput" rows="1" placeholder="Написать сообщение..."></textarea>
        <button class="send-btn" id="sendBtn" disabled>
          <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></svg>
        </button>
      </div>
    </div>
  </section>
</div>

<nav class="mobilenav">
  <button data-tab="chats" class="active">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
    Чаты
  </button>
  <button data-tab="contacts">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="9" cy="7" r="4"/><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/></svg>
    Контакты
  </button>
  <button id="mobileProfileBtn">
    <div class="avatar sm" id="mobileAvatar" style="width:22px;height:22px;font-size:10px;"></div>
    Профиль
  </button>
</nav>

<!-- Profile modal -->
<div class="modal-backdrop hidden" id="profileModal">
  <div class="modal">
    <div class="modal-header">
      <h2>Профиль</h2>
      <button class="btn-icon" id="closeProfileBtn">✕</button>
    </div>
    <div class="modal-body">
      <div class="profile-view">
        <div class="avatar lg" id="profileAvatar"></div>
      </div>
      <div class="field">
        <label>Имя</label>
        <input type="text" id="profileName" maxlength="40">
      </div>
      <div class="field">
        <label>Статус</label>
        <input type="text" id="profileStatus" maxlength="60">
      </div>
      <div class="field">
        <label>Юзернейм</label>
        <input type="text" id="profileUsername" disabled style="opacity:0.6;">
      </div>
      <div class="theme-toggle">
        <span>Тёмная тема</span>
        <div class="switch on" id="themeSwitch"></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost btn-danger" id="logoutBtn">Выйти</button>
      <button class="btn btn-primary" id="saveProfileBtn" style="width:auto;">Сохранить</button>
    </div>
  </div>
</div>

<!-- New chat / new group modal -->
<div class="modal-backdrop hidden" id="newChatModal">
  <div class="modal">
    <div class="modal-header">
      <h2 id="newChatTitle">Новый чат</h2>
      <button class="btn-icon" id="closeNewChatBtn">✕</button>
    </div>
    <div class="modal-body">
      <div class="field" id="groupNameField" style="display:none;">
        <label>Название группы</label>
        <input type="text" id="groupNameInput" maxlength="40" placeholder="Например, Команда проекта">
      </div>
      <div class="search-box" style="margin-bottom:12px;">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        <input type="text" id="newChatSearch" placeholder="Юзернейм">
      </div>
      <div id="newChatResults"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" id="switchToGroupBtn">Создать группу вместо этого</button>
      <button class="btn btn-primary hidden" id="createGroupBtn" style="width:auto;">Создать</button>
    </div>
  </div>
</div>

<script type="module" src="js/app.js"></script>
</body>
</html>
