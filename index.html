<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Aurora — вход</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="toast-root"></div>

<div class="auth-wrap">
  <div class="auth-aurora"></div>

  <div class="auth-card">
    <div class="logo" style="font-size:22px;margin-bottom:18px;">Aurora</div>
    <h1 class="auth-title" id="formTitle">Вход</h1>
    <p class="auth-sub" id="formSub">Рады видеть вас снова</p>

    <form id="authForm" autocomplete="off">
      <div class="field hidden" id="fieldName">
        <label>Имя</label>
        <input type="text" id="displayName" placeholder="Как вас зовут" maxlength="40">
      </div>
      <div class="field hidden" id="fieldUsername">
        <label>Юзернейм</label>
        <input type="text" id="username" placeholder="например, ann_k" maxlength="20">
      </div>
      <div class="field">
        <label>Email</label>
        <input type="email" id="email" placeholder="you@example.com" required>
      </div>
      <div class="field">
        <label>Пароль</label>
        <input type="password" id="password" placeholder="Минимум 6 символов" required minlength="6">
      </div>
      <div class="field-error" id="formError"></div>
      <button type="submit" class="btn btn-primary" id="submitBtn">
        <span id="submitLabel">Войти</span>
      </button>
    </form>

    <div class="auth-switch">
      <span id="switchText">Нет аккаунта?</span>
      <button type="button" id="switchBtn">Создать</button>
    </div>
  </div>
</div>

<script type="module" src="js/auth.js"></script>
</body>
</html>
