<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мессенджер - Вход</title>
    <!-- Подключение Firebase (если используется) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="firebase-config.js"></script>
    <style>
        body { font-family: Arial; max-width: 400px; margin: 50px auto; padding: 20px; }
        input, button { display: block; width: 100%; padding: 10px; margin: 10px 0; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <h2>Вход в мессенджер</h2>
    
    <!-- Форма входа -->
    <div id="loginForm">
        <input type="email" id="loginEmail" placeholder="Email">
        <input type="password" id="loginPassword" placeholder="Пароль">
        <button onclick="login()">Войти</button>
        <button onclick="showRegister()">Зарегистрироваться</button>
        <!-- УДАЛЕНА КНОПКА ВОССТАНОВЛЕНИЯ ПАРОЛЯ -->
    </div>

    <!-- Форма регистрации -->
    <div id="registerForm" class="hidden">
        <input type="email" id="regEmail" placeholder="Email">
        <input type="password" id="regPassword" placeholder="Пароль">
        <button onclick="register()">Зарегистрироваться</button>
        <button onclick="showLogin()">Назад</button>
    </div>

    <script>
        // Функция входа
        function login() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            firebase.auth().signInWithEmailAndPassword(email, password)
                .then(() => { window.location.href = 'chats.html'; })
                .catch(error => alert(error.message));
        }

        // Функция регистрации
        function register() {
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;
            firebase.auth().createUserWithEmailAndPassword(email, password)
                .then(() => { 
                    alert('Регистрация успешна!');
                    window.location.href = 'chats.html';
                })
                .catch(error => alert(error.message));
        }

        // Переключение форм
        function showRegister() {
            document.getElementById('loginForm').classList.add('hidden');
            document.getElementById('registerForm').classList.remove('hidden');
        }
        function showLogin() {
            document.getElementById('registerForm').classList.add('hidden');
            document.getElementById('loginForm').classList.remove('hidden');
        }

        // ❌ УДАЛЕНА ВСЯ ФУНКЦИЯ ВОССТАНОВЛЕНИЯ ПАРОЛЯ
        // Больше нет:
        // - sendPasswordResetEmail()
        // - кнопки "Забыли пароль?"
        // - поля для ввода email для восстановления
    </script>
</body>
</html>
