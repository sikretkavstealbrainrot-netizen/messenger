<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мессенджер</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 50px 40px 40px;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 420px;
        }
        .container h1 {
            text-align: center;
            font-size: 28px;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 8px;
        }
        .container h2 {
            text-align: center;
            font-size: 18px;
            font-weight: 500;
            color: #666;
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #555;
            margin-bottom: 6px;
        }
        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e8ecf1;
            border-radius: 12px;
            font-size: 15px;
            color: #333;
            background: #fafbfc;
            transition: all 0.3s ease;
        }
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            background: white;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }
        .btn-primary {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 28px rgba(102, 126, 234, 0.4);
        }
        .btn-primary:active {
            transform: translateY(0);
        }
        .btn-secondary {
            width: 100%;
            padding: 14px;
            background: #e8ecf1;
            color: #333;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }
        .btn-secondary:hover {
            background: #d5d9e0;
        }
        .link-row {
            text-align: center;
            margin-top: 20px;
            color: #888;
            font-size: 14px;
        }
        .link-row a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
            transition: color 0.3s;
        }
        .link-row a:hover {
            color: #764ba2;
            text-decoration: underline;
        }
        .error-message {
            background: #fde8e8;
            color: #c0392b;
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 14px;
            margin-top: 16px;
            text-align: center;
            display: none;
            border-left: 4px solid #c0392b;
        }
        .error-message.show {
            display: block;
        }
        .success-message {
            background: #d4edda;
            color: #155724;
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 14px;
            margin-top: 16px;
            text-align: center;
            display: none;
            border-left: 4px solid #155724;
        }
        .success-message.show {
            display: block;
        }
        .hidden {
            display: none !important;
        }
        .code-warning {
            background: #fff3cd;
            color: #856404;
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 13px;
            margin-top: 16px;
            text-align: center;
            border-left: 4px solid #ffc107;
            display: none;
        }
        .code-warning.show {
            display: block;
        }
        .code-warning strong {
            color: #d39e00;
        }
        .code-input {
            letter-spacing: 2px;
            font-size: 18px !important;
            font-weight: 600;
            text-align: center;
        }
        .code-hint {
            font-size: 12px;
            color: #999;
            text-align: center;
            margin-top: 4px;
        }
        .security-badge {
            display: inline-block;
            background: #e8f0fe;
            color: #1a73e8;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>💬 Мессенджер</h1>
        
        <!-- ====== ФОРМА РЕГИСТРАЦИИ ====== -->
        <div id="registerForm">
            <h2>Регистрация</h2>
            
            <div class="form-group">
                <label>👤 Ваш ник</label>
                <input type="text" id="regUsername" placeholder="Придумайте ник" maxlength="30">
            </div>
            
            <div class="form-group">
                <label>🔐 Пароль</label>
                <input type="password" id="regPassword" placeholder="Придумайте пароль (мин. 6 символов)">
            </div>
            
            <button class="btn-primary" onclick="register()">ЗАРЕГИСТРИРОВАТЬСЯ</button>
            
            <div class="error-message" id="registerError"></div>
            <div class="success-message" id="registerSuccess"></div>
            
            <div class="link-row">
                Уже есть аккаунт? <a onclick="showLogin()">Войти</a>
            </div>
        </div>
        
        <!-- ====== ФОРМА ВХОДА ====== -->
        <div id="loginForm" class="hidden">
            <h2>Вход</h2>
            
            <div class="form-group">
                <label>👤 Ник</label>
                <input type="text" id="loginUsername" placeholder="Ваш ник">
            </div>
            
            <div class="form-group">
                <label>🔐 Пароль</label>
                <input type="password" id="loginPassword" placeholder="Ваш пароль">
            </div>
            
            <button class="btn-primary" onclick="login()">ВОЙТИ</button>
            
            <div class="error-message" id="loginError"></div>
            
            <!-- Поле для безопасного кода (показывается если есть код) -->
            <div id="codeField" class="hidden">
                <div class="form-group" style="margin-top: 16px;">
                    <label>🔑 Безопасный код <span class="security-badge">1-6 символов</span></label>
                    <input type="password" id="loginCode" class="code-input" placeholder="Введите безопасный код" maxlength="6">
                    <div class="code-hint">Введите код, который вы установили в настройках</div>
                </div>
                <button class="btn-primary" onclick="loginWithCode()" style="margin-top: 0;">ПОДТВЕРДИТЬ КОД</button>
                <button class="btn-secondary" onclick="cancelCode()">Отмена</button>
            </div>
            
            <div class="link-row">
                Нет аккаунта? <a onclick="showRegister()">Зарегистрироваться</a>
            </div>
        </div>
    </div>

    <script>
        // ========== ПЕРЕКЛЮЧЕНИЕ ФОРМ ==========
        function showRegister() {
            document.getElementById('loginForm').classList.add('hidden');
            document.getElementById('registerForm').classList.remove('hidden');
            document.getElementById('registerError').classList.remove('show');
            document.getElementById('registerSuccess').classList.remove('show');
            document.getElementById('codeField').classList.add('hidden');
        }
        
        function showLogin() {
            document.getElementById('registerForm').classList.add('hidden');
            document.getElementById('loginForm').classList.remove('hidden');
            document.getElementById('loginError').classList.remove('show');
            document.getElementById('codeField').classList.add('hidden');
        }

        // ========== РЕГИСТРАЦИЯ ==========
        function register() {
            const username = document.getElementById('regUsername').value.trim();
            const password = document.getElementById('regPassword').value;
            const errorEl = document.getElementById('registerError');
            const successEl = document.getElementById('registerSuccess');
            
            errorEl.classList.remove('show');
            successEl.classList.remove('show');
            
            if (!username || !password) {
                errorEl.textContent = '⚠️ Заполните все поля';
                errorEl.classList.add('show');
                return;
            }
            
            if (username.length < 3) {
                errorEl.textContent = '⚠️ Ник должен быть не менее 3 символов';
                errorEl.classList.add('show');
                return;
            }
            
            if (password.length < 6) {
                errorEl.textContent = '⚠️ Пароль должен быть не менее 6 символов';
                errorEl.classList.add('show');
                return;
            }
            
            // Создаем временный email (ник + случайное число)
            const tempEmail = username.toLowerCase().replace(/[^a-z0-9]/g, '') + Math.floor(Math.random()*10000) + '@temp.com';
            
            firebase.auth().createUserWithEmailAndPassword(tempEmail, password)
                .then((userCredential) => {
                    const user = userCredential.user;
                    // Сохраняем ник и пустой код в Firestore
                    return db.collection('users').doc(user.uid).set({
                        username: username,
                        securityCode: '', // пусто = нет кода
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                })
                .then(() => {
                    successEl.textContent = '✅ Регистрация успешна! Перенаправление...';
                    successEl.classList.add('show');
                    setTimeout(() => {
                        window.location.href = 'chats.html';
                    }, 1500);
                })
                .catch((error) => {
                    let msg = error.message;
                    if (error.code === 'auth/email-already-in-use') {
                        msg = '❌ Этот ник уже занят. Попробуйте другой.';
                    }
                    errorEl.textContent = msg;
                    errorEl.classList.add('show');
                });
        }

        // ========== ВХОД (первый этап) ==========
        let loginUserData = null; // временно храним данные пользователя

        function login() {
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;
            const errorEl = document.getElementById('loginError');
            
            errorEl.classList.remove('show');
            
            if (!username || !password) {
                errorEl.textContent = '⚠️ Заполните все поля';
                errorEl.classList.add('show');
                return;
            }
            
            // Ищем пользователя по нику в Firestore
            db.collection('users').where('username', '==', username).get()
                .then((querySnapshot) => {
                    if (querySnapshot.empty) {
                        errorEl.textContent = '❌ Пользователь не найден';
                        errorEl.classList.add('show');
                        return;
                    }
                    
                    const doc = querySnapshot.docs[0];
                    const userData = doc.data();
                    const uid = doc.id;
                    
                    // Пытаемся войти с временным email (восстанавливаем email из ника)
                    // Мы не храним email, поэтому используем поиск по uid
                    // Для входа нам нужен email, но мы его не знаем. Решение: хранить email в Firestore или использовать другой метод.
                    // Проще: при регистрации сохраняем email в поле, но мы его не сохранили.
                    // Переделаем: будем использовать email = ник + '@temp.com' при регистрации, но это может конфликтовать.
                    // Лучше: при входе сначала проверить наличие пользователя с таким ником, затем попытаться войти через email, но мы не знаем email.
                    // Альтернатива: использовать Firebase Authentication с кастомными токенами, но это сложно.
                    // Самое простое: при регистрации сохранять email в Firestore, а при входе использовать его.
                    // Я изменю регистрацию: буду сохранять email в поле.
                    // Но пока проще: при входе будем использовать временный email, сгенерированный из ника.
                    // Однако проблема: если два пользователя с одинаковым ником? Ник уникален, мы проверяем.
                    // Восстановим email из ника: 
                    const email = username.toLowerCase().replace(/[^a-z0-9]/g, '') + '@temp.com';
                    
                    // Вход
                    firebase.auth().signInWithEmailAndPassword(email, password)
                        .then((userCredential) => {
                            // Проверяем, совпадает ли uid с найденным
                            if (userCredential.user.uid !== uid) {
                                // Если не совпадает, выходим и показываем ошибку
                                firebase.auth().signOut();
                                errorEl.textContent = '❌ Неверные данные';
                                errorEl.classList.add('show');
                                return;
                            }
                            
                            // Сохраняем данные пользователя
                            loginUserData = { uid, ...userData };
                            
                            // Проверяем наличие безопасного кода
                            if (userData.securityCode && userData.securityCode.length > 0) {
                                // Показываем поле для кода
                                document.getElementById('codeField').classList.remove('hidden');
                                document.getElementById('loginError').textContent = '🔑 Введите безопасный код для входа';
                                document.getElementById('loginError').className = 'error-message show';
                                document.getElementById('loginError').style.background = '#e8f0fe';
                                document.getElementById('loginError').style.color = '#1a73e8';
                                document.getElementById('loginError').style.borderLeftColor = '#1a73e8';
                            } else {
                                // Нет кода — сразу переходим
                                window.location.href = 'chats.html';
                            }
                        })
                        .catch((error) => {
                            errorEl.textContent = '❌ Неверный пароль или пользователь не найден';
                            errorEl.classList.add('show');
                        });
                })
                .catch((error) => {
                    errorEl.textContent = '❌ Ошибка: ' + error.message;
                    errorEl.classList.add('show');
                });
        }

        // ========== ВХОД С КОДОМ (второй этап) ==========
        function loginWithCode() {
            const code = document.getElementById('loginCode').value.trim();
            const errorEl = document.getElementById('loginError');
            
            errorEl.classList.remove('show');
            
            if (!code) {
                errorEl.textContent = '⚠️ Введите безопасный код';
                errorEl.classList.add('show');
                return;
            }
            
            if (code.length < 1 || code.length > 6) {
                errorEl.textContent = '⚠️ Код должен быть от 1 до 6 символов';
                errorEl.classList.add('show');
                return;
            }
            
            if (!loginUserData) {
                errorEl.textContent = '❌ Ошибка: попробуйте войти заново';
                errorEl.classList.add('show');
                return;
            }
            
            // Проверяем код
            if (code === loginUserData.securityCode) {
                // Код верный — вход
                window.location.href = 'chats.html';
            } else {
                errorEl.textContent = '❌ Неверный безопасный код';
                errorEl.classList.add('show');
                document.getElementById('loginCode').value = '';
                document.getElementById('loginCode').focus();
            }
        }

        function cancelCode() {
            document.getElementById('codeField').classList.add('hidden');
            document.getElementById('loginError').className = 'error-message';
            document.getElementById('loginError').textContent = '';
            document.getElementById('loginCode').value = '';
            loginUserData = null;
            // Выходим из аккаунта, если зашли
            firebase.auth().signOut();
        }

        // ========== АВТО-ВХОД ==========
        firebase.auth().onAuthStateChanged((user) => {
            if (user && window.location.pathname.includes('index.html')) {
                // Проверяем, есть ли код
                db.collection('users').doc(user.uid).get()
                    .then((doc) => {
                        if (doc.exists) {
                            const data = doc.data();
                            if (data.securityCode && data.securityCode.length > 0) {
                                // Есть код — показываем поле для кода
                                // Но мы уже на странице входа, можно показать
                                document.getElementById('codeField').classList.remove('hidden');
                                document.getElementById('loginError').textContent = '🔑 Введите безопасный код для входа';
                                document.getElementById('loginError').className = 'error-message show';
                                document.getElementById('loginError').style.background = '#e8f0fe';
                                document.getElementById('loginError').style.color = '#1a73e8';
                                document.getElementById('loginError').style.borderLeftColor = '#1a73e8';
                                loginUserData = { uid: user.uid, ...data };
                            } else {
                                window.location.href = 'chats.html';
                            }
                        }
                    });
            }
        });

        // Инициализация Firestore
        const db = firebase.firestore();
    </script>
</body>
</html>
