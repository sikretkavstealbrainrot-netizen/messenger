<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мессенджер</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 400px;
        }
        h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #333;
            font-size: 28px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
            font-size: 14px;
        }
        input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }
        button:active {
            transform: translateY(0);
        }
        .link {
            text-align: center;
            margin-top: 20px;
            color: #666;
        }
        .link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
        }
        .link a:hover {
            text-decoration: underline;
        }
        .error {
            color: #e74c3c;
            font-size: 14px;
            margin-top: 10px;
            text-align: center;
            background: #fde8e8;
            padding: 10px;
            border-radius: 8px;
            display: none;
        }
        .error.show {
            display: block;
        }
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>💬 Мессенджер</h1>
        
        <!-- ФОРМА РЕГИСТРАЦИИ -->
        <div id="registerForm">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="regEmail" placeholder="sikretkavstealbrainrot@gmail.com" value="sikretkavstealbrainrot@gmail.com">
            </div>
            <div class="form-group">
                <label>Пароль</label>
                <input type="password" id="regPassword" placeholder="Введите пароль" value="TYUPDHL">
            </div>
            <button onclick="register()">Зарегистрироваться</button>
            <div class="error" id="registerError"></div>
            <div class="link">
                Уже есть аккаунт? <a onclick="showLogin()">Войти</a>
            </div>
        </div>

        <!-- ФОРМА ВХОДА -->
        <div id="loginForm" class="hidden">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="loginEmail" placeholder="sikretkavstealbrainrot@gmail.com">
            </div>
            <div class="form-group">
                <label>Пароль</label>
                <input type="password" id="loginPassword" placeholder="Введите пароль">
            </div>
            <button onclick="login()">Войти</button>
            <div class="error" id="loginError"></div>
            <div class="link">
                Нет аккаунта? <a onclick="showRegister()">Зарегистрироваться</a>
            </div>
            <!-- ❌ УДАЛЕНА ССЫЛКА "ЗАБЫЛИ ПАРОЛЬ?" -->
        </div>
    </div>

    <script>
        // Показ формы регистрации
        function showRegister() {
            document.getElementById('loginForm').classList.add('hidden');
            document.getElementById('registerForm').classList.remove('hidden');
            document.getElementById('registerError').classList.remove('show');
        }

        // Показ формы входа
        function showLogin() {
            document.getElementById('registerForm').classList.add('hidden');
            document.getElementById('loginForm').classList.remove('hidden');
            document.getElementById('loginError').classList.remove('show');
        }

        // РЕГИСТРАЦИЯ (БЕЗ ОТПРАВКИ ПИСЬМА)
        function register() {
            const email = document.getElementById('regEmail').value.trim();
            const password = document.getElementById('regPassword').value;
            const errorEl = document.getElementById('registerError');

            if (!email || !password) {
                errorEl.textContent = 'Заполните все поля';
                errorEl.classList.add('show');
                return;
            }

            if (password.length < 6) {
                errorEl.textContent = 'Пароль должен быть не менее 6 символов';
                errorEl.classList.add('show');
                return;
            }

            // 🔥 ВАЖНО: ОТПРАВКА ПИСЬМА УБРАНА
            // Не вызывается sendEmailVerification()
            firebase.auth().createUserWithEmailAndPassword(email, password)
                .then((userCredential) => {
                    // ✅ Пользователь создан, письмо НЕ отправляется
                    // userCredential.user.sendEmailVerification(); // ❌ ЭТА СТРОКА УДАЛЕНА
                    alert('✅ Регистрация успешна!');
                    window.location.href = 'chats.html';
                })
                .catch((error) => {
                    errorEl.textContent = error.message;
                    errorEl.classList.add('show');
                });
        }

        // ВХОД
        function login() {
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            const errorEl = document.getElementById('loginError');

            if (!email || !password) {
                errorEl.textContent = 'Заполните все поля';
                errorEl.classList.add('show');
                return;
            }

            firebase.auth().signInWithEmailAndPassword(email, password)
                .then(() => {
                    window.location.href = 'chats.html';
                })
                .catch((error) => {
                    errorEl.textContent = error.message;
                    errorEl.classList.add('show');
                });
        }

        // Автоматический вход, если уже авторизован
        firebase.auth().onAuthStateChanged((user) => {
            if (user && window.location.pathname.includes('index.html')) {
                window.location.href = 'chats.html';
            }
        });

        // ❌ УДАЛЕНА ФУНКЦИЯ ВОССТАНОВЛЕНИЯ ПАРОЛЯ
        // Больше нет:
        // - resetPassword()
        // - sendPasswordResetEmail()
        // - кнопки "Забыли пароль?"
    </script>
</body>
</html>
